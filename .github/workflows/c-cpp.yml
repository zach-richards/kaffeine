name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      run: |
        sudo dnf update
        sudo dnf install -y \
          qt6-base-dev \
          qt6-tools-dev \
          qt6-tools-dev-tools
    - name: Install Dependencies
      run: |
        sudo dnf update
        sudo dnf install -y \
          qt6-base-dev \
          qt6-tools-dev \
          extra-cmake-modules \
          kf6-kcoreaddons-dev \
          kf6-i18n-dev \
          kf6-widgetsaddons-dev
    - name: Configure
      run: cmake -B build -S .
    - name: Build
      run: cmake --build build
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck

