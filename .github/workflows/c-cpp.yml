name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -S .
    - name: Build
      run: cmake --build build
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck

