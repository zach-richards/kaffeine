name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    container:
      image: fedora:44

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo dnf update
        sudo dnf install -y \
          qt6-qtbase-devel \
          qt6-qttools-devel \
          extra-cmake-modules \
          kf6-kcoreaddons-devel \
          kf6-ki18n-devel \
          kf6-kwidgetsaddons-devel \
          kf6-kstatusnotifieritem-devel

    - name: Configure
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build

    - name: Test visual
      run: |
        sudo dnf install xorg-x11-server-Xvfb
        Xvfb :99 -screen 0 1024x768x24 &
        export DISPLAY=:99
        ./build/Kaffeine

    - name: make
      run: make

    - name: make check
      run: make check

    - name: make distcheck
      run: make distcheck

