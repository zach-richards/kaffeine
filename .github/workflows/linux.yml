name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            make \
            qt6-base-dev \
            qt6-tools-dev \
            extra-cmake-modules \
            libkf6coreaddons-dev \
            libkf6i18n-dev \
            libkf6widgetsaddons-dev \
            xvfb \
            x11-utils

      - name: Install libkf6statusnotifieritem-dev from Ubuntu mirror
        run: |
          wget https://mirrors.egr.msu.edu/ubuntu/pool/universe/k/kf6-kstatusnotifieritem/libkf6statusnotifieritem6_6.6.0-0ubuntu1_amd64.deb
          wget https://mirrors.egr.msu.edu/ubuntu/pool/universe/k/kf6-kstatusnotifieritem/libkf6statusnotifieritem-dev_6.6.0-0ubuntu1_amd64.deb
          wget https://mirrors.egr.msu.edu/ubuntu/pool/universe/k/kf6-kstatusnotifieritem/libkf6statusnotifieritem-data_6.6.0-0ubuntu1_all.deb
          sudo dpkg -i libkf6statusnotifieritem-data_6.6.0-0ubuntu1_all.deb
          sudo dpkg -i libkf6statusnotifieritem6_6.6.0-0ubuntu1_amd64.deb
          sudo dpkg -i libkf6statusnotifieritem-dev_6.6.0-0ubuntu1_amd64.deb

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Test
        env:
          DISPLAY: :99
        run: ctest --test-dir build --output-on-failure