name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Add KDE Neon repository (provides KF6 on Ubuntu 24.04)
        run: |
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://archive.neon.kde.org/public.key | sudo gpg --dearmor -o /usr/share/keyrings/neon-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/neon-archive-keyring.gpg] http://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/neon.list
          sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            cmake \
            make \
            qt6-base-dev \
            qt6-tools-dev \
            extra-cmake-modules \
            libkf6coreaddons-dev \
            libkf6i18n-dev \
            libkf6widgetsaddons-dev \
            libkf6statusnotifieritem-dev \
            xvfb \
            x11-utils

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Test
        env:
          DISPLAY: :99
        run: ctest --test-dir build --output-on-failure