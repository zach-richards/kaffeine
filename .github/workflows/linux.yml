name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            make \
            qt6-base-dev \
            qt6-tools-dev \
            extra-cmake-modules \
            xvfb \
            x11-utils

      - name: Install KF6 packages
        run: |
          MIRROR="https://download.nus.edu.sg/mirror/ubuntu/pool/universe/k"

          wget -q $MIRROR/kf6-kcoreaddons/libkf6coreaddons-data_6.12.0-0ubuntu1_all.deb
          wget -q $MIRROR/kf6-kcoreaddons/libkf6coreaddons6_6.12.0-0ubuntu1_amd64.deb
          wget -q $MIRROR/kf6-kcoreaddons/libkf6coreaddons-dev_6.12.0-0ubuntu1_amd64.deb

          wget -q $MIRROR/kf6-ki18n/libkf6i18n-data_6.12.0-0ubuntu1_all.deb
          wget -q $MIRROR/kf6-ki18n/libkf6i18n6_6.12.0-0ubuntu1_amd64.deb
          wget -q $MIRROR/kf6-ki18n/libkf6i18n-dev_6.12.0-0ubuntu1_amd64.deb

          wget -q $MIRROR/kf6-kwidgetsaddons/libkf6widgetsaddons-data_6.12.0-0ubuntu1_all.deb
          wget -q $MIRROR/kf6-kwidgetsaddons/libkf6widgetsaddons6_6.12.0-0ubuntu1_amd64.deb
          wget -q $MIRROR/kf6-kwidgetsaddons/libkf6widgetsaddons-dev_6.12.0-0ubuntu1_amd64.deb

          wget -q $MIRROR/kf6-kstatusnotifieritem/libkf6statusnotifieritem-data_6.12.0-0ubuntu1_all.deb
          wget -q $MIRROR/kf6-kstatusnotifieritem/libkf6statusnotifieritem6_6.12.0-0ubuntu1_amd64.deb
          wget -q $MIRROR/kf6-kstatusnotifieritem/libkf6statusnotifieritem-dev_6.12.0-0ubuntu1_amd64.deb

          sudo dpkg -i \
            libkf6coreaddons-data_6.12.0-0ubuntu1_all.deb \
            libkf6coreaddons6_6.12.0-0ubuntu1_amd64.deb \
            libkf6coreaddons-dev_6.12.0-0ubuntu1_amd64.deb \
            libkf6i18n-data_6.12.0-0ubuntu1_all.deb \
            libkf6i18n6_6.12.0-0ubuntu1_amd64.deb \
            libkf6i18n-dev_6.12.0-0ubuntu1_amd64.deb \
            libkf6widgetsaddons-data_6.12.0-0ubuntu1_all.deb \
            libkf6widgetsaddons6_6.12.0-0ubuntu1_amd64.deb \
            libkf6widgetsaddons-dev_6.12.0-0ubuntu1_amd64.deb \
            libkf6statusnotifieritem-data_6.12.0-0ubuntu1_all.deb \
            libkf6statusnotifieritem6_6.12.0-0ubuntu1_amd64.deb \
            libkf6statusnotifieritem-dev_6.12.0-0ubuntu1_amd64.deb

          sudo apt-get install -f -y

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Test
        env:
          DISPLAY: :99
        run: ctest --test-dir build --output-on-failure